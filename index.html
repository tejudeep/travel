<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#17171a">
<title>Travel Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css">
<style>
  :root{ --bg:#f7f3ec; --card:#fffdf9; --ink:#17171a; --muted:#6f6a61; --line:#e9e2d6; --accent:#b45309; --green:#10b981; --radius:20px; --shadow:0 14px 38px -16px rgba(40,30,15,.25); }
  *{ box-sizing:border-box; } html{ scroll-behavior:smooth; }
  body{ margin:0; background:var(--bg); color:var(--ink); font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased; }
  h1,h2,h3,h4,.celebrate{ font-family:Fraunces,Georgia,serif; letter-spacing:-.01em; } h2{ font-weight:700; font-size:24px; margin:6px 0 14px; }
  .wrap{ max-width:900px; margin:0 auto; padding:0 16px 100px; } section{ margin-top:26px; }
  .kicker{ text-transform:uppercase; letter-spacing:.15em; font-size:12px; font-weight:700; color:var(--accent); }
  .muted{ color:var(--muted); font-size:13px; margin:0; } .prose{ color:#3a352c; line-height:1.8; font-size:15.5px; } .hidden{ display:none !important; }
  .hero{ position:relative; width:100%; min-height:50vh; display:flex; align-items:flex-end; overflow:hidden; }
  .hero-media{ position:absolute; inset:0; background:linear-gradient(135deg,#0e7490,#10b981); background-size:cover; background-position:center; transform:scale(1.04); animation:kenburns 22s ease-out forwards; }
  @keyframes kenburns{ from{transform:scale(1.04)} to{transform:scale(1.09)} }
  .hero-grad{ position:absolute; inset:0; background:linear-gradient(180deg,rgba(15,12,8,0) 25%,rgba(15,12,8,.5) 70%,rgba(15,12,8,.86) 100%); }
  .hero-inner{ position:relative; z-index:2; width:100%; max-width:900px; margin:0 auto; padding:26px 20px 58px; color:#fff; }
  .hero-flag{ font-size:56px; line-height:1; filter:drop-shadow(0 5px 12px rgba(0,0,0,.45)); }
  .hero h1{ font-weight:700; font-size:44px; margin:6px 0 4px; text-shadow:0 2px 26px rgba(0,0,0,.45); } .hero-sub{ font-size:16px; opacity:.95; margin:0; }
  .badge{ display:inline-flex; align-items:center; gap:6px; background:rgba(16,185,129,.96); color:#fff; font-size:12px; font-weight:600; padding:6px 13px; border-radius:999px; margin-bottom:10px; }
  @media(min-width:720px){ .hero{ min-height:58vh; } .hero h1{ font-size:60px; } }
  .card{ background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:22px; box-shadow:var(--shadow); }
  .q,#visitedCard,#letsgoCard,#landingCard{ margin-top:-44px; position:relative; z-index:5; } #landingCard{ text-align:center; }
  .q{ text-align:center; } .q h2{ margin:0 0 16px; } .q .btns{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .celebrate{ text-align:center; font-weight:700; font-size:22px; color:var(--green); margin:0; }
  .btn{ display:inline-flex; align-items:center; justify-content:center; gap:8px; border:none; cursor:pointer; font-family:Inter; font-size:15px; font-weight:600; padding:14px 22px; border-radius:999px; text-decoration:none; transition:transform .16s ease, box-shadow .22s ease; }
  .btn:active{ transform:scale(.97); } .btn-yes{ background:linear-gradient(135deg,#10b981,#059669); color:#fff; box-shadow:0 12px 22px -10px rgba(16,185,129,.8); }
  .btn-ghost{ background:#fff; color:var(--ink); border:1px solid var(--line); } .btn-ghost:hover{ background:#f4efe6; }
  .btn-lets{ width:100%; background:linear-gradient(135deg,#0f766e,#134e4a); color:#fff; font-size:17px; padding:17px; box-shadow:0 16px 32px -12px rgba(15,118,110,.6); }
  .btn-yes:hover,.btn-lets:hover,.btn-fly:hover{ transform:translateY(-2px); } .btn-fly{ background:linear-gradient(135deg,#0e7490,#155e75); color:#fff; white-space:nowrap; box-shadow:0 12px 22px -10px rgba(14,116,144,.7); }
  .cta{ display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; } #map{ width:100%; height:330px; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px; }
  .tile{ position:relative; display:block; text-decoration:none; color:inherit; background:var(--card); border:1px solid var(--line); border-radius:18px; overflow:hidden; box-shadow:var(--shadow); transition:transform .25s ease, box-shadow .25s ease; }
  .tile:hover{ transform:translateY(-5px); box-shadow:0 24px 46px -18px rgba(40,30,15,.35); }
  .tile .img{ aspect-ratio:4/3; background:linear-gradient(135deg,#d6ccb8,#a7c4bc); background-size:cover; background-position:center; transition:transform .55s ease; } .tile:hover .img{ transform:scale(1.07); }
  .tile .body{ padding:14px 15px 16px; } .tile h4{ margin:0 0 6px; font-size:17px; } .tile p{ margin:0; font-size:13px; color:var(--muted); line-height:1.55; }
  .gem-badge{ position:absolute; top:10px; left:10px; background:rgba(180,83,9,.96); color:#fff; font-size:11px; font-weight:700; padding:4px 10px; border-radius:999px; }
  .feature{ display:grid; grid-template-columns:1fr 1.1fr; gap:22px; align-items:center; }
  .fimg{ aspect-ratio:4/3; border-radius:18px; background:linear-gradient(135deg,#d6ccb8,#a7c4bc); background-size:cover; background-position:center; box-shadow:var(--shadow); }
  .feature.reverse .fimg{ order:2; } @media(max-width:640px){ .feature{ grid-template-columns:1fr; } .feature.reverse .fimg{ order:0; } }
  .chips{ display:flex; flex-wrap:wrap; gap:10px; } .chip{ background:#f4efe6; border:1px solid var(--line); border-radius:999px; padding:8px 14px; font-size:13px; } .chip span{ color:var(--muted); } .chip b{ color:var(--ink); font-weight:600; }
  .factgrid{ display:grid; grid-template-columns:1fr 1fr; gap:14px; } @media(max-width:640px){ .factgrid{ grid-template-columns:1fr; } }
  .factcard{ display:flex; gap:14px; align-items:flex-start; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:var(--shadow); }
  .factnum{ font-family:Fraunces; font-weight:700; font-size:26px; color:var(--accent); opacity:.55; line-height:1; } .factcard p{ margin:0; font-size:14.5px; line-height:1.6; color:#3a352c; }
  .holidays{ list-style:none; padding:0; margin:0; display:grid; gap:8px; } .holidays li{ display:flex; justify-content:space-between; gap:12px; padding:11px 15px; background:#f4efe6; border:1px solid var(--line); border-radius:12px; font-size:14px; } .holidays .hd{ color:var(--muted); white-space:nowrap; }
  .explore{ display:grid; grid-template-columns:1fr 1fr; gap:16px; } @media(max-width:640px){ .explore{ grid-template-columns:1fr; } }
  .xcard{ display:flex; flex-direction:column; text-decoration:none; color:#fff; border-radius:20px; padding:22px; min-height:160px; box-shadow:var(--shadow); transition:transform .2s ease; } .xcard:hover{ transform:translateY(-4px); }
  .xcard-ao{ background:linear-gradient(135deg,#1f2a2e,#31504a); } .xcard-cr{ background:linear-gradient(135deg,#7c2d12,#b45309); }
  .xtag{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; opacity:.85; } .xcard h3{ margin:10px 0 6px; font-size:21px; } .xcard p{ margin:0 0 auto; font-size:14px; opacity:.92; } .xgo{ margin-top:14px; font-weight:600; }
  .fab{ position:fixed; right:16px; bottom:16px; z-index:60; background:linear-gradient(135deg,#b45309,#f59e0b); color:#fff; font-weight:600; font-size:14px; padding:13px 18px; border-radius:999px; box-shadow:0 12px 26px -8px rgba(180,83,9,.65); cursor:pointer; text-decoration:none; } .fab:hover{ transform:translateY(-2px); }
  .stamp-overlay{ position:fixed; inset:0; z-index:70; display:flex; align-items:center; justify-content:center; background:rgba(20,15,10,.25); backdrop-filter:blur(2px); }
  .stamp{ width:220px; height:220px; border-radius:50%; border:5px double #16a34a; color:#16a34a; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; font-family:Fraunces,serif; text-transform:uppercase; background:rgba(255,255,255,.55); opacity:.92; animation:stampin .6s cubic-bezier(.2,1.3,.3,1) both; }
  @keyframes stampin{ 0%{transform:scale(2.6) rotate(-13deg); opacity:0} 55%{transform:scale(.86) rotate(-13deg); opacity:1} 100%{transform:scale(1) rotate(-13deg); opacity:.92} }
  .stamp-top{ font-size:30px; font-weight:700; letter-spacing:.05em; } .stamp-mid{ font-size:18px; font-weight:600; text-align:center; padding:0 10px; } .stamp-date{ font-size:13px; letter-spacing:.12em; }
  .skeleton{ background:linear-gradient(90deg,#efe9dd 25%,#e4dccc 37%,#efe9dd 63%); background-size:400% 100%; animation:shimmer 1.4s infinite; } @keyframes shimmer{ 0%{background-position:100% 0} 100%{background-position:0 0} }
  .sk-line{ height:12px; border-radius:6px; margin:9px 0; } .sk-line.short{ width:60%; }
  .reveal{ opacity:0; transform:translateY(16px); transition:opacity .6s cubic-bezier(.2,.7,.2,1), transform .6s cubic-bezier(.2,.7,.2,1); } .reveal.in{ opacity:1; transform:none; }
  footer{ text-align:center; color:var(--muted); font-size:12px; padding:36px 16px; }
</style>
</head>
<body>
  <header class="hero" id="hero"><div class="hero-media skeleton" id="heroMedia"></div><div class="hero-grad"></div>
    <div class="hero-inner reveal" id="heroInner"><span class="badge hidden" id="badge"></span><div class="hero-flag" id="flag">🌍</div><h1 id="countryName">Your Travel Map</h1><p class="hero-sub" id="tagline">Tap a tag to begin ✈️</p></div>
  </header>
  <main class="wrap">
    <section class="card q reveal hidden" id="questionCard"><h2 id="questionText">Have you been here?</h2><div class="btns"><button class="btn btn-yes" id="yesBtn">Yes, I've been ✅</button><button class="btn btn-ghost" id="noBtn">Not yet ✈️</button></div></section>
    <section class="card reveal hidden" id="visitedCard"><p class="celebrate">🎉 You've been to <span id="visitedName"></span>!</p></section>
    <section class="reveal hidden" id="letsgoCard"><button class="btn btn-lets" id="letsgoBtn">Let's go — explore this place ✨</button></section>
    <section class="card reveal hidden" id="landingCard"><span class="kicker">Where to next?</span><h2>Pick a tag — or let fate decide</h2><button class="btn btn-lets" id="surpriseBig" style="max-width:320px;margin:0 auto">🎲 Surprise me</button></section>
    <section class="card reveal" id="mapCard"><span class="kicker">Your journey</span><h2 id="mapTitle">Your travel map</h2><div id="map"></div></section>
    <div id="content" class="hidden"></div>
  </main>
  <footer>A little travel gift 💚</footer>
  <a class="fab" id="surpriseBtn">🎲 Surprise me</a>
  <div id="stampOverlay" class="stamp-overlay hidden"><div class="stamp"><span class="stamp-top">Visited</span><span class="stamp-mid" id="stampCountry"></span><span class="stamp-date" id="stampDate"></span></div></div>

  function esc(s){ return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escA(s){ return esc(s).replace(/"/g,'&quot;'); }
  function setBg(node,url,fb){ if(!node) return; const t=url||fb; if(!t){ node.classList.remove('skeleton'); return; } const im=new Image(); im.onload=()=>{ node.style.backgroundImage=`url("${t}")`; node.classList.remove('skeleton'); }; im.onerror=()=>{ if(fb&&fb!==t){ setBg(node,fb,null);} else { node.classList.remove('skeleton'); } }; im.src=t; }
  function imgURLs(s,want){ if(!s) return {main:null,fb:null}; const t=s.thumbnail,o=s.originalimage; if(t&&t.source){ const cap=(o&&o.width)?o.width:(t.width||want); const size=Math.max(200,Math.min(want,cap)); return {main:t.source.replace(/\/\d+px-/,'/'+size+'px-'),fb:t.source}; } if(o&&o.source) return {main:o.source,fb:o.source}; return {main:null,fb:null}; }
  function heroURLs(s){ if(!s) return {main:null,fb:null}; const o=s.originalimage,t=s.thumbnail; if(t&&t.source){ const cap=(o&&o.width)?o.width:(t.width||1600); const size=Math.min(1600,cap); return {main:t.source.replace(/\/\d+px-/,'/'+size+'px-'),fb:(o&&o.source)||t.source}; } if(o&&o.source) return {main:o.source,fb:o.source}; return {main:null,fb:null}; }
  function pickHeroSummary(sums){ let best=null,bw=0; for(const s of sums){ if(!s) continue; const w=(s.originalimage&&s.originalimage.width)||(s.thumbnail&&s.thumbnail.width)||0; if(w>bw){bw=w;best=s;} } return best; }
  function hydrateImages(root){ root.querySelectorAll('[data-main]').forEach(n=>setBg(n,n.dataset.main||null,n.dataset.fb||null)); }
  async function wikiSummary(title){ try{ const r=await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent((title||'').replace(/ /g,'_'))); return r.ok?await r.json():null; }catch(e){ return null; } }
  function offsetFromTz(tz){ if(!tz) return null; if(tz==='UTC') return 0; const m=/UTC([+-])(\d{2}):(\d{2})/.exec(tz); if(!m) return null; return (m[1]==='-'?-1:1)*(parseInt(m[2])*60+parseInt(m[3])); }
  function tickClock(off){ const el=$('localClock'); if(!el) return; const now=new Date(); const loc=new Date(now.getTime()+now.getTimezoneOffset()*60000+off*60000); el.textContent=loc.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
  function confetti(){ const c=document.createElement('canvas'); c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:95'; document.body.appendChild(c); const x=c.getContext('2d'); c.width=innerWidth; c.height=innerHeight; const col=['#f59e0b','#10b981','#0ea5e9','#ef4444','#b45309','#8b5cf6']; const P=[]; for(let i=0;i<150;i++) P.push({x:Math.random()*c.width,y:-20-Math.random()*c.height*0.6,r:6+Math.random()*8,c:col[i%col.length],vy:2+Math.random()*4,vx:-2+Math.random()*4,a:Math.random()*6,va:-0.2+Math.random()*0.4}); let t=0; (function loop(){ t++; x.clearRect(0,0,c.width,c.height); P.forEach(p=>{ p.y+=p.vy; p.x+=p.vx; p.a+=p.va; x.save(); x.translate(p.x,p.y); x.rotate(p.a); x.fillStyle=p.c; x.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6); x.restore(); }); if(t<160) requestAnimationFrame(loop); else c.remove(); })(); }
  function celebrate(name){ $('stampCountry').textContent=name; $('stampDate').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'}); $('stampOverlay').classList.remove('hidden'); confetti(); }

  const code=(new URLSearchParams(location.search).get('c')||'').toUpperCase().trim();
  const visited=getVisited();
  const map=new jsVectorMap({selector:'#map',map:'world',zoomButtons:true,regionsSelectable:false,regionStyle:{initial:{fill:'#e2ddd0'},selected:{fill:'#10b981'}},selectedRegions:visited});
  reveal($('heroInner'),80); reveal(mapCard,220);
  function surprise(){ const pool=Object.keys(HIGHLIGHTS).filter(k=>k!==code); const list=pool.length?pool:Object.keys(HIGHLIGHTS); location.href='?c='+list[Math.floor(Math.random()*list.length)]; }
  $('surpriseBtn').onclick=surprise; if($('surpriseBig')) $('surpriseBig').onclick=surprise;
  $('stampOverlay').onclick=()=>location.reload();

  if(!code){ nameEl.textContent="Your Travel Map"; taglineEl.textContent=visited.length?`${visited.length} ${visited.length===1?'country':'countries'} explored 🌱`:"Tap a tag to begin ✈️"; setBg(heroMedia,null); landingCard.classList.remove('hidden'); reveal(landingCard,120); }
  else { loadCountry(code); }

  async function loadCountry(cc){
    let name=NAMES[cc]||null,capital=null,region="—",population="—",languages="—",langList=[],currencies="—",area=null,calling=null,driving=null,timezone=null,currencyCode=null,lat=null,lng=null,apiOk=false;
    try{ const res=await fetch(`https://restcountries.com/v3.1/alpha/${cc}?fields=name,capital,region,subregion,population,languages,currencies,area,timezones,car,idd,latlng,capitalInfo`);
      if(res.ok){ const j=await res.json(); const d=Array.isArray(j)?j[0]:j;
        if(d&&d.name){ apiOk=true; name=d.name.common; capital=(d.capital&&d.capital[0])||null; region=d.region+(d.subregion?` · ${d.subregion}`:""); population=d.population?d.population.toLocaleString():"—";
          if(d.languages){ langList=Object.values(d.languages); languages=langList.join(", "); }
          if(d.currencies){ currencyCode=Object.keys(d.currencies)[0]; currencies=Object.values(d.currencies).map(c=>c.symbol?`${c.name} (${c.symbol})`:c.name).join(", "); }
          area=d.area?Math.round(d.area).toLocaleString():null; calling=(d.idd&&d.idd.root)?(d.idd.root+((d.idd.suffixes&&d.idd.suffixes.length===1)?d.idd.suffixes[0]:"")):null; driving=(d.car&&d.car.side)?d.car.side:null; timezone=(d.timezones&&d.timezones.length)?d.timezones[0]:null;
          const ci=d.capitalInfo&&d.capitalInfo.latlng; lat=ci?ci[0]:(d.latlng?d.latlng[0]:null); lng=ci?ci[1]:(d.latlng?d.latlng[1]:null); } }
    }catch(e){}
    if(!name){ nameEl.textContent=`Couldn't find "${cc}"`; taglineEl.textContent="That doesn't look like a valid 2-letter country code."; setBg(heroMedia,null); return; }
    const already=visited.includes(cc);
    flagEl.textContent=flagFromCode(cc); nameEl.textContent=name; taglineEl.textContent=capital||"";
    if(already){ badgeEl.textContent="✓ Visited"; badgeEl.classList.remove('hidden'); }
    const ctx={cc,name,capital:capital||name,region,population,languages,langList,currencies,area,calling,driving,timezone,currencyCode,lat,lng,apiOk};
    renderContent(ctx); prepareContent(ctx);
    const off=offsetFromTz(timezone); if(off!=null){ tickClock(off); setInterval(()=>tickClock(off),20000); }
    if(already){ $('visitedName').textContent=name; visitedCard.classList.remove('hidden'); reveal(visitedCard,120); showContent(); }
    else{ $('questionText').textContent=`Have you been to ${name}?`; questionCard.classList.remove('hidden'); reveal(questionCard,120);
      $('yesBtn').onclick=()=>{ const l=getVisited(); if(!l.includes(cc))l.push(cc); saveVisited(l); celebrate(name); setTimeout(()=>location.reload(),2400); };
      $('noBtn').onclick=()=>{ questionCard.classList.add('hidden'); letsgoCard.classList.remove('hidden'); reveal(letsgoCard,40); };
      $('letsgoBtn').onclick=()=>{ letsgoCard.classList.add('hidden'); showContent(); }; }
  }
  function showContent(){ content.classList.remove('hidden'); revealAll(content,80); }
  function storyMarkup(k,ki,h,rev){ return `<section class="reveal" id="${k}Section"><div class="feature${rev?' reverse':''}"><div class="fimg skeleton" id="${k}Img"></div><div><span class="kicker">${ki}</span><h2>${h}</h2><p class="prose" id="${k}Text">Loading…</p></div></div></section>`; }
  function tileSkeletons(n){ let s=''; for(let i=0;i<n;i++) s+=`<div class="tile"><div class="img skeleton"></div><div class="body"><div class="sk-line skeleton"></div><div class="sk-line short skeleton"></div></div></div>`; return s; }
  function renderTiles(list,sums){ return list.map((item,i)=>{ const p=(typeof item==='string')?{t:item,gem:false}:item; const s=sums[i]; const title=(s&&s.title)||p.t; let desc=(s&&s.extract)||""; if(desc.length>150) desc=desc.slice(0,150).replace(/\s+\S*$/,'')+'…'; const u=imgURLs(s,700); const link=(s&&s.content_urls&&s.content_urls.desktop&&s.content_urls.desktop.page)||('https://en.wikipedia.org/wiki/'+encodeURIComponent(p.t.replace(/ /g,'_'))); return `<a class="tile" href="${escA(link)}" target="_blank" rel="noopener"><div class="img skeleton" data-main="${escA(u.main||'')}" data-fb="${escA(u.fb||'')}"></div>${p.gem?'<span class="gem-badge">✨ Hidden gem</span>':''}<div class="body"><h4>${esc(title)}</h4><p>${esc(desc)}</p></div></a>`; }).join(''); }
  function findPhrase(langList){ for(const L of (langList||[])){ if(PHRASES[L]) return {lang:L,hi:PHRASES[L][0],ty:PHRASES[L][1]}; } return null; }

  function renderContent(ctx){
    const flightsUrl='https://www.google.com/travel/flights?q='+encodeURIComponent(`Flights from ${HOME_CITY} to ${ctx.name}`);
    const aoSlug=ctx.name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,''); const crName=ctx.name.replace(/\s+/g,'');
    const nP=(HIGHLIGHTS[ctx.cc]||[]).length+(HIDDEN_GEMS[ctx.cc]||[]).length; const nF=(FOODS[ctx.cc]||[]).length;
    const clockChip=offsetFromTz(ctx.timezone)!=null?`<div class="chip"><span>Local time</span> <b id="localClock">--:--</b></div>`:'';
    const facts=ctx.apiOk?`<section class="card reveal" id="factsCard"><span class="kicker">Quick facts</span><h2>Good to know</h2><div class="chips" id="factsChips"><div class="chip"><span>Capital</span> <b>${esc(ctx.capital)}</b></div><div class="chip"><span>Region</span> <b>${esc(ctx.region)}</b></div><div class="chip"><span>Population</span> <b>${esc(ctx.population)}</b></div>${ctx.area?`<div class="chip"><span>Area</span> <b>${esc(ctx.area)} km²</b></div>`:''}<div class="chip"><span>Languages</span> <b>${esc(ctx.languages)}</b></div><div class="chip"><span>Currency</span> <b>${esc(ctx.currencies)}</b></div>${ctx.calling?`<div class="chip"><span>Dial code</span> <b>${esc(ctx.calling)}</b></div>`:''}${ctx.driving?`<div class="chip"><span>Driving</span> <b>${esc(ctx.driving)} side</b></div>`:''}${ctx.timezone?`<div class="chip"><span>Time zone</span> <b>${esc(ctx.timezone)}</b></div>`:''}${clockChip}</div></section>`:'';
    const fs=(FACTS[ctx.cc]||[]); const didYouKnow=fs.length?`<section class="reveal"><span class="kicker">Curiosities</span><h2>Did you know?</h2><div class="factgrid">${fs.map((f,i)=>`<div class="factcard"><div class="factnum">${String(i+1).padStart(2,'0')}</div><p>${esc(f)}</p></div>`).join('')}</div></section>`:'';
    const bt=BEST_TIME[ctx.cc]; const bestTime=bt?`<section class="card reveal" style="border-left:5px solid var(--accent)"><span class="kicker">When to go</span><h2>Best time to visit</h2><p class="prose" style="margin:0">${esc(bt)}</p></section>`:'';
    const ph=findPhrase(ctx.langList); const phrases=ph?`<section class="card reveal"><span class="kicker">Speak like a local</span><h2>A little ${esc(ph.lang)}</h2><div class="chips"><div class="chip"><span>Hello</span> <b>${esc(ph.hi)}</b></div><div class="chip"><span>Thank you</span> <b>${esc(ph.ty)}</b></div></div></section>`:'';
    const placesInner=nP?`<div class="grid" id="placesGrid">${tileSkeletons(nP)}</div>`:`<p class="prose">Discover ideas on <a href="https://en.wikivoyage.org/wiki/${encodeURIComponent(ctx.name.replace(/ /g,'_'))}" target="_blank" rel="noopener">Wikivoyage →</a> and <a href="https://www.atlasobscura.com/things-to-do/${encodeURIComponent(aoSlug)}" target="_blank" rel="noopener">Atlas Obscura →</a></p>`;
    const foodSection=nF?`<section class="reveal" id="foodGridSection"><span class="kicker">Eat &amp; drink</span><h2>A taste of ${esc(ctx.name)}</h2><div class="grid" id="foodGrid">${tileSkeletons(nF)}</div></section>`:'';
    content.innerHTML=`
      <section class="card cta reveal"><div><span class="kicker">Getting there</span><h2 style="margin:2px 0">Fly from ${esc(HOME_CITY)}</h2><p class="muted">Live prices on Google Flights</p></div><a class="btn btn-fly" href="${flightsUrl}" target="_blank" rel="noopener">✈️ See flights</a></section>
      <section class="reveal"><span class="kicker">Overview</span><h2>About ${esc(ctx.name)}</h2><p class="prose" id="aboutText">Loading…</p></section>
      ${bestTime}
      <section class="reveal"><span class="kicker">Wondrous places</span><h2>Must-see &amp; hidden gems</h2>${placesInner}</section>
      ${storyMarkup('history','History','Through the ages',false)}
      ${storyMarkup('culture','Culture','Life &amp; traditions',true)}
      ${storyMarkup('cuisine','Food &amp; Drink','Taste the culture',false)}
      ${foodSection}${phrases}${didYouKnow}${facts}
      <section class="card reveal hidden" id="holidaysSection"><span class="kicker">Calendar</span><h2>Public holidays this year</h2><ul class="holidays" id="holidaysList"></ul></section>
      <section class="reveal"><span class="kicker">Explore deeper</span><h2>Down the rabbit hole</h2><div class="explore"><a class="xcard xcard-ao" href="https://www.atlasobscura.com/things-to-do/${encodeURIComponent(aoSlug)}" target="_blank" rel="noopener"><div class="xtag">Atlas Obscura</div><h3>Hidden wonders &amp; curious places</h3><p>Offbeat sights and the stories behind them.</p><span class="xgo">Discover →</span></a><a class="xcard xcard-cr" href="https://www.countryreports.org/country/${encodeURIComponent(crName)}.htm" target="_blank" rel="noopener"><div class="xtag">CountryReports</div><h3>The full country report</h3><p>Culture, economy, geography &amp; daily life.</p><span class="xgo">Read report →</span></a></div></section>`;
  }
  function fillStory(k,sum,fb){ const sec=$(k+'Section'); if(!sec) return; if(sum&&sum.extract){ $(k+'Text').textContent=sum.extract; let u=imgURLs(sum,900); if(!u.main) u=imgURLs(fb,900); setBg($(k+'Img'),u.main,u.fb); } else { sec.classList.add('hidden'); } }
  async function prepareContent(ctx){
    const places=(HIGHLIGHTS[ctx.cc]||[]).map(t=>({t,gem:false})).concat((HIDDEN_GEMS[ctx.cc]||[]).map(t=>({t,gem:true}))); const foods=(FOODS[ctx.cc]||[]);
    const [countrySum,capitalSum,tourismSum,histSum,cultSum,cuisSum,placeSums,foodSums]=await Promise.all([ wikiSummary(ctx.name),wikiSummary(ctx.capital),wikiSummary('Tourism in '+ctx.name),wikiSummary('History of '+ctx.name),wikiSummary('Culture of '+ctx.name),wikiSummary('Cuisine of '+ctx.name),Promise.all(places.map(p=>wikiSummary(p.t))),Promise.all(foods.map(t=>wikiSummary(t))) ]);
    const hs=pickHeroSummary(placeSums.concat([tourismSum,capitalSum,countrySum])); const hu=heroURLs(hs); setBg(heroMedia,hu.main,hu.fb);
    if($('aboutText')) $('aboutText').textContent=(countrySum&&countrySum.extract)||"Description unavailable right now.";
    fillStory('history',histSum,countrySum); fillStory('culture',cultSum,countrySum); fillStory('cuisine',cuisSum,countrySum);
    if($('placesGrid')){ $('placesGrid').innerHTML=renderTiles(places,placeSums); hydrateImages($('placesGrid')); }
    if($('foodGrid')&&foods.length){ $('foodGrid').innerHTML=renderTiles(foods,foodSums); hydrateImages($('foodGrid')); }
    if(ctx.apiOk&&ctx.currencyCode){ try{ const r=await fetch('https://open.er-api.com/v6/latest/USD'); const j=await r.json(); const rate=j&&j.rates&&j.rates[ctx.currencyCode]; if(rate){ const c=document.createElement('div'); c.className='chip'; c.innerHTML=`<span>Exchange</span> <b>1 USD ≈ ${(Math.round(rate*100)/100).toLocaleString()} ${esc(ctx.currencyCode)}</b>`; const b=$('factsChips'); if(b) b.appendChild(c); } }catch(e){} }
    if(ctx.lat!=null&&ctx.lng!=null){ try{ const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${ctx.lat}&longitude=${ctx.lng}&current=temperature_2m`); const j=await r.json(); const c=j&&j.current&&j.current.temperature_2m; if(c!=null){ const f=Math.round(c*9/5+32); const chip=document.createElement('div'); chip.className='chip'; chip.innerHTML=`<span>Weather now</span> <b>${f}°F (${Math.round(c)}°C) in ${esc(ctx.capital)}</b>`; const b=$('factsChips'); if(b) b.appendChild(chip); } }catch(e){} }
    try{ const y=new Date().getFullYear(); const r=await fetch(`https://date.nager.at/api/v3/PublicHolidays/${y}/${ctx.cc}`); if(r.ok){ const h=await r.json(); if(Array.isArray(h)&&h.length){ $('holidaysList').innerHTML=h.slice(0,10).map(x=>{ const d=new Date(x.date+'T00:00:00'); return `<li><span>${esc(x.name)}</span><span class="hd">${d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span></li>`; }).join(''); const sec=$('holidaysSection'); sec.classList.remove('hidden'); reveal(sec); } } }catch(e){}
  }
  </script>
