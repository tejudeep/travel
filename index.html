<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/css/jsvectormap.min.css">
  <style>
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
           background:#f4f7f6; color:#1c2b2d; -webkit-font-smoothing:antialiased; }
    .wrap { max-width:720px; margin:0 auto; padding:20px 16px 60px; }
    header { text-align:center; margin-bottom:8px; }
    .flag { font-size:56px; line-height:1; }
    h1 { font-size:26px; margin:6px 0 2px; }
    .sub { color:#6b7c7e; font-size:14px; margin:0 0 16px; }
    #map { width:100%; height:300px; background:#fff; border-radius:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .card { background:#fff; border-radius:16px; padding:18px; margin-top:16px; box-shadow:0 2px 10px rgba(0,0,0,.06); }
    .q { text-align:center; } .q h2 { font-size:20px; margin:4px 0 14px; }
    .btn { display:inline-block; border:none; cursor:pointer; font-size:16px; font-weight:600;
           padding:14px 22px; border-radius:12px; margin:6px; text-decoration:none; }
    .btn-green { background:#2ecc71; color:#fff; }
    .btn-blue  { background:#3498db; color:#fff; }
    .btn-ghost { background:#eef2f1; color:#1c2b2d; }
    .btn-wide  { display:block; width:100%; text-align:center; }
    .hidden { display:none; }
    .facts { list-style:none; padding:0; margin:0; }
    .facts li { padding:8px 0; border-bottom:1px solid #eef2f1; display:flex; justify-content:space-between; gap:12px; }
    .facts li span:first-child { color:#6b7c7e; }
    .celebrate { text-align:center; font-size:20px; font-weight:700; color:#2ecc71; }
    .link-row a { margin:6px 6px 0 0; }
    .highlight-list { margin:8px 0 0; padding-left:18px; } .highlight-list li { margin:4px 0; }
    h3 { margin:18px 0 8px; }
    footer { text-align:center; color:#6b7c7e; font-size:12px; margin-top:26px; }
    .loading { text-align:center; color:#6b7c7e; padding:20px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="flag" id="flag">🌍</div>
      <h1 id="countryName">Travel Map</h1>
      <p class="sub" id="tagline">Tap one of your NFC tags to begin ✈️</p>
    </header>

    <div id="map"></div>

    <div class="card q hidden" id="questionCard">
      <h2 id="questionText">Have you been here?</h2>
      <button class="btn btn-green" id="yesBtn">Yes, I've been! ✅</button>
      <button class="btn btn-ghost" id="noBtn">Not yet ✈️</button>
    </div>

    <div class="card hidden" id="visitedCard">
      <p class="celebrate">🎉 You've been to <span id="visitedName"></span>!</p>
    </div>

    <div class="card hidden" id="letsgoCard">
      <button class="btn btn-blue btn-wide" id="letsgoBtn">Let's go! Show me this place ✨</button>
    </div>

    <div class="card hidden" id="infoCard">
      <div id="infoBody" class="loading">Loading…</div>
    </div>

    <footer>A little travel gift 💚</footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/js/jsvectormap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsvectormap@1.5.3/dist/maps/world.js"></script>
  <script>
  // ===== EDIT THESE IF YOU WANT =====
  const HOME_CITY = "Austin";
  const HIGHLIGHTS = {
    JP: ["Kyoto's temples & bamboo groves", "Tokyo food scene", "Mt. Fuji & hot springs"],
    IT: ["Rome's Colosseum", "Venice canals", "Amalfi Coast"],
    FR: ["Eiffel Tower, Paris", "French Riviera", "Loire Valley châteaux"]
  };
  // Backup names (used only if the live info service is unavailable)
  const NAMES = {
    JP:"Japan", IT:"Italy", FR:"France", ES:"Spain", DE:"Germany", GB:"United Kingdom",
    US:"United States", MX:"Mexico", CA:"Canada", BR:"Brazil", AR:"Argentina", PE:"Peru",
    CL:"Chile", CO:"Colombia", AU:"Australia", NZ:"New Zealand", TH:"Thailand", VN:"Vietnam",
    IN:"India", CN:"China", KR:"South Korea", ID:"Indonesia", MY:"Malaysia", SG:"Singapore",
    PH:"Philippines", GR:"Greece", PT:"Portugal", NL:"Netherlands", BE:"Belgium", CH:"Switzerland",
    AT:"Austria", IE:"Ireland", SE:"Sweden", NO:"Norway", DK:"Denmark", FI:"Finland",
    IS:"Iceland", PL:"Poland", CZ:"Czechia", HU:"Hungary", HR:"Croatia", TR:"Turkey",
    EG:"Egypt", MA:"Morocco", ZA:"South Africa", KE:"Kenya", TZ:"Tanzania", AE:"United Arab Emirates",
    IL:"Israel", JO:"Jordan", SA:"Saudi Arabia", QA:"Qatar", CR:"Costa Rica", PA:"Panama",
    CU:"Cuba", DO:"Dominican Republic", JM:"Jamaica", EC:"Ecuador", BO:"Bolivia", UY:"Uruguay",
    RO:"Romania", BG:"Bulgaria", RS:"Serbia", SK:"Slovakia", SI:"Slovenia", LK:"Sri Lanka",
    NP:"Nepal", KH:"Cambodia", LA:"Laos", MM:"Myanmar", FJ:"Fiji", MV:"Maldives"
  };
  // ==================================

  function getVisited(){ try { return JSON.parse(localStorage.getItem('visited')||'[]'); } catch(e){ return []; } }
  function saveVisited(l){ localStorage.setItem('visited', JSON.stringify(l)); }
  const el = id => document.getElementById(id);

  // 2-letter code -> flag emoji, no internet needed
  function flagFromCode(cc){
    if(!/^[A-Z]{2}$/.test(cc)) return "🌍";
    return cc.replace(/./g, c => String.fromCodePoint(127397 + c.charCodeAt()));
  }

  const code = (new URLSearchParams(location.search).get('c')||'').toUpperCase().trim();
  const visited = getVisited();

  const map = new jsVectorMap({
    selector:'#map', map:'world', zoomButtons:true, regionsSelectable:false,
    regionStyle:{ initial:{ fill:'#dfe6e9' }, selected:{ fill:'#2ecc71' } },
    selectedRegions: visited
  });

  if(!code){
    el('tagline').textContent = visited.length
      ? `You've visited ${visited.length} ${visited.length===1?'country':'countries'} so far 🌱`
      : "Tap one of your NFC tags to begin ✈️";
  } else {
    loadCountry(code);
  }

  async function loadCountry(cc){
    let name = NAMES[cc] || null;
    let capital = null, region="—", population="—", currencies="—", languages="—", apiOk = false;

    try {
      const url = `https://restcountries.com/v3.1/alpha/${cc}?fields=name,capital,region,subregion,population,languages,currencies`;
      const res = await fetch(url);
      if(res.ok){
        const json = await res.json();
        const d = Array.isArray(json) ? json[0] : json;
        if(d && d.name){
          apiOk = true;
          name = d.name.common;
          capital = (d.capital && d.capital[0]) || null;
          region = d.region + (d.subregion ? ` · ${d.subregion}` : "");
          population = d.population ? d.population.toLocaleString() : "—";
          currencies = d.currencies ? Object.values(d.currencies).map(c=>c.name).join(", ") : "—";
          languages  = d.languages  ? Object.values(d.languages).join(", ") : "—";
        }
      }
    } catch(e){ /* offline or blocked — backup name is used */ }

    if(!name){
      el('countryName').textContent = `Hmm, couldn't find "${cc}"`;
      el('tagline').textContent = "That doesn't look like a valid 2-letter country code.";
      return;
    }

    el('flag').textContent = flagFromCode(cc);
    el('countryName').textContent = name;
    el('tagline').textContent = capital ? `Capital: ${capital}` : "";

    const info = { name, capital: capital || name, cc, region, population, currencies, languages, apiOk };

    if(visited.includes(cc)){
      el('visitedName').textContent = name;
      el('visitedCard').classList.remove('hidden');
      el('infoCard').classList.remove('hidden');
      showInfo(info);
    } else {
      el('questionText').textContent = `Have you been to ${name}?`;
      el('questionCard').classList.remove('hidden');
      el('yesBtn').onclick = () => { const l=getVisited(); if(!l.includes(cc)) l.push(cc); saveVisited(l); location.reload(); };
      el('noBtn').onclick  = () => { el('questionCard').classList.add('hidden'); el('letsgoCard').classList.remove('hidden'); };
      el('letsgoBtn').onclick = () => { el('letsgoCard').classList.add('hidden'); el('infoCard').classList.remove('hidden'); showInfo(info); };
    }
  }

  async function showInfo(info){
    const { name, cc, region, population, currencies, languages, apiOk } = info;
    const flightsUrl    = `https://www.google.com/travel/flights?q=` + encodeURIComponent(`Flights from ${HOME_CITY} to ${name}`);
    const wikivoyageUrl = `https://en.wikivoyage.org/wiki/` + encodeURIComponent(name.replace(/ /g,'_'));
    const wikipediaUrl  = `https://en.wikipedia.org/wiki/` + encodeURIComponent(name.replace(/ /g,'_'));

    let highlightsHtml = "";
    if(HIGHLIGHTS[cc] && HIGHLIGHTS[cc].length)
      highlightsHtml = `<h3>Don't miss</h3><ul class="highlight-list">${HIGHLIGHTS[cc].map(h=>`<li>${h}</li>`).join("")}</ul>`;

    const factsHtml = apiOk ? `
      <ul class="facts">
        <li><span>Capital</span><span>${info.capital}</span></li>
        <li><span>Region</span><span>${region}</span></li>
        <li><span>Population</span><span>${population}</span></li>
        <li><span>Languages</span><span>${languages}</span></li>
        <li><span>Currency</span><span>${currencies}</span></li>
      </ul>` : "";

    el('infoBody').classList.remove('loading');
    el('infoBody').innerHTML = `
      <a class="btn btn-blue btn-wide" href="${flightsUrl}" target="_blank" rel="noopener">✈️ See flights from ${HOME_CITY} to ${name}</a>
      <h3>About ${name}</h3><div id="aboutText">Loading…</div>
      ${factsHtml}
      ${highlightsHtml}
      <h3>Plan your trip</h3>
      <div class="link-row">
        <a class="btn btn-ghost" href="${wikivoyageUrl}" target="_blank" rel="noopener">🧭 Things to do</a>
        <a class="btn btn-ghost" href="${wikipediaUrl}" target="_blank" rel="noopener">📖 History</a>
      </div>`;

    try {
      const w = await (await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/`+encodeURIComponent(name))).json();
      el('aboutText').textContent = w.extract || "No summary available.";
    } catch(e){ el('aboutText').textContent = "Couldn't load the description right now."; }
  }
  </script>
</body>
</html>
